services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: harmony
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: harmony
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmony"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://harmony:${DB_PASSWORD}@db:5432/harmony
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: "3001"

  web:
    build:
      context: .
      target: web
    restart: always
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_URL}/api
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
